apiVersion: batch/v1
kind: Job
metadata:
  name: preinstall-job
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

spec:
  template:
    spec:
      restartPolicy: Never

      containers:
      - name: preinstall
        image: busybox
        command:
        - sh
        - -c
        - echo "Pre-install Hook läuft!"
